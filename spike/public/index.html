<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loom Spike — interactive claude over ws</title>
  <link rel="stylesheet" href="/vendor/xterm.css" />
  <script src="/vendor/xterm.js"></script>
  <script src="/vendor/addon-fit.js"></script>
  <style>
    body { margin: 0; background: #0b0b0c; color: #ddd; font-family: ui-monospace, Consolas, monospace; }
    #bar { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; padding: 8px; background: #151517; border-bottom: 1px solid #2a2a2e; }
    button { background: #26262b; color: #eee; border: 1px solid #3a3a40; border-radius: 4px; padding: 5px 10px; cursor: pointer; font: inherit; }
    button:hover { background: #32323a; }
    button:disabled { opacity: .4; cursor: default; }
    label { font-size: 12px; }
    #status { font-size: 12px; color: #9ad; margin-left: auto; white-space: pre; }
    #term { padding: 6px; }
    .sep { width: 1px; height: 20px; background: #3a3a40; margin: 0 4px; }
  </style>
</head>
<body>
  <div id="bar">
    <button id="spawn">Spawn</button>
    <label><input type="checkbox" id="altScreen" /> alt-screen (no DISABLE var)</label>
    <label><input type="checkbox" id="withPrompt" checked /> startup prompt</label>
    <div class="sep"></div>
    <button id="detach" disabled>Detach (close ws)</button>
    <button id="attach" disabled>Re-attach</button>
    <button id="repaint" disabled>Repaint (Ctrl-L)</button>
    <div class="sep"></div>
    <button id="graceful" disabled>Graceful stop</button>
    <button id="hard" disabled>Hard stop</button>
    <button id="resume" disabled>Resume</button>
    <div id="status">no session</div>
  </div>
  <div id="term"></div>

  <script>
    const STARTUP_PROMPT = "In one short line each, list three facts about weaving looms. Do not use any tools.";
    const term = new Terminal({
      fontSize: 13, convertEol: true, cursorBlink: true,
      scrollback: 5000, theme: { background: "#0b0b0c" },
    });
    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.open(document.getElementById("term"));
    fit.fit(); // initial sizing only; server pins pty geometry at 120x40

    const decoder = new TextDecoder();
    let ws = null, loomId = null, claudeSessionId = null, alive = false;

    const $ = (id) => document.getElementById(id);
    function setStatus() {
      $("status").textContent =
        `loomId=${loomId ?? "-"}  claudeSessionId=${claudeSessionId ?? "(pending)"}  alive=${alive}  ws=${ws && ws.readyState === 1 ? "attached" : "detached"}`;
      $("detach").disabled = !(ws && ws.readyState === 1);
      $("attach").disabled = !loomId || (ws && ws.readyState === 1);
      $("repaint").disabled = !(ws && ws.readyState === 1) || !alive;
      $("graceful").disabled = !loomId || !alive;
      $("hard").disabled = !loomId || !alive;
      $("resume").disabled = !claudeSessionId;
    }

    function connect(id) {
      ws = new WebSocket(`ws://${location.host}/ws/term/${id}`);
      ws.binaryType = "arraybuffer";
      ws.onopen = setStatus;
      ws.onclose = setStatus;
      ws.onmessage = (e) => {
        if (typeof e.data === "string") {
          let msg; try { msg = JSON.parse(e.data); } catch { term.write(e.data); return; }
          if (msg.type === "reset") term.reset();
          else if (msg.type === "sessionId") { claudeSessionId = msg.id; setStatus(); }
          else if (msg.type === "exit") { alive = false; term.write(`\r\n\x1b[33m[session exited code=${msg.code}]\x1b[0m\r\n`); setStatus(); }
        } else {
          term.write(decoder.decode(new Uint8Array(e.data), { stream: true }));
        }
      };
    }

    // Bidirectional: every keystroke in xterm -> pty stdin (Loom's divergence from Jinn).
    term.onData((d) => { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: "stdin", data: d })); });

    async function post(path, body) {
      const r = await fetch(path, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body || {}) });
      return r.json();
    }

    $("spawn").onclick = async () => {
      term.reset();
      const s = await post("/api/spawn", {
        altScreen: $("altScreen").checked,
        prompt: $("withPrompt").checked ? STARTUP_PROMPT : undefined,
      });
      loomId = s.loomId; claudeSessionId = s.claudeSessionId; alive = s.alive;
      connect(loomId); setStatus();
    };
    $("detach").onclick = () => { if (ws) ws.close(); };
    $("attach").onclick = () => { if (loomId) connect(loomId); };
    $("repaint").onclick = () => { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: "repaint" })); };
    $("graceful").onclick = async () => { await post("/api/stop", { loomId, mode: "graceful" }); };
    $("hard").onclick = async () => { await post("/api/stop", { loomId, mode: "hard" }); };
    $("resume").onclick = async () => {
      const s = await post("/api/resume", { loomId });
      term.reset();
      loomId = s.loomId; claudeSessionId = s.claudeSessionId; alive = s.alive;
      connect(loomId); setStatus();
    };

    // poll liveness for button state
    setInterval(async () => {
      if (!loomId) return;
      try { const st = await (await fetch(`/api/state?loomId=${loomId}`)).json(); alive = st.alive; if (st.claudeSessionId) claudeSessionId = st.claudeSessionId; setStatus(); } catch {}
    }, 1500);

    setStatus();
  </script>
</body>
</html>
