name: Release

# Cut a release by pushing a tag: `git push origin vX.Y.Z` (see docs/releasing.md).
# The tag's version MUST match the root package.json `version` (the single source of truth) or the
# run fails fast. A prerelease tag (e.g. vX.Y.Z-beta.N) publishes to the matching npm dist-tag
# (beta) and marks the GitHub Release as a prerelease; a normal tag publishes to `latest`.
#
# Publishing uses npm TRUSTED PUBLISHING (OIDC) — NO long-lived NPM_TOKEN secret. The job mints a
# short-lived credential via GitHub's OIDC (`id-token: write`) and npm exchanges it; provenance is
# generated automatically. Requires npm CLI >= 11.5.1 (Node 22 ships npm 10.x, so we upgrade npm below)
# and Node >= 22.14.0. See https://docs.npmjs.com/trusted-publishers.
# Owner one-time prerequisites (see docs/releasing.md › "Owner publish steps"):
#   - the public GitHub repo exists,
#   - the npm `loomctl` name is reserved + a LICENSE chosen and added to the generated package.json,
#   - a TRUSTED PUBLISHER is configured on npmjs.com for the `loomctl` package: GitHub Actions →
#     organization/user `DanielC000`, repository `loom`, workflow filename `release.yml`, allowed
#     action `npm publish` (no environment). This replaces the old NPM_TOKEN secret.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # manual run releases the current package.json version (tag = v<version>)

permissions:
  contents: write # create the GitHub Release (and tag, on manual runs)
  id-token: write # npm publish --provenance (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.6.4 # match the repo's packageManager (package.json)

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22" # resolves to the latest 22.x (>= 22.14.0, required for OIDC trusted publishing)
          registry-url: "https://registry.npmjs.org" # scope npm to the public registry (OIDC auth, no token)
          # No package-manager cache: never cache in a release build (publish only what was just built+tested).

      - name: Upgrade npm for OIDC trusted publishing (needs npm >= 11.5.1; Node 22 ships npm 10.x)
        # PINNED to 11.18.0 (the version that shipped 0.16.0): npm@latest is now 12.0.0, whose provenance
        # path throws `Cannot find module 'sigstore'` (MODULE_NOT_FOUND) and breaks `npm publish` under
        # trusted-publishing/provenance — it blocked the first 0.17.0 release attempt. Re-pin to @latest once
        # a fixed 12.x ships. 11.18.0 is >= 11.5.1 (OIDC min) and known-good for automatic provenance.
        run: npm install -g npm@11.18.0 && npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Run daemon test suite (hermetic gate)
        run: pnpm --filter @loom/daemon test:daemon

      - name: Resolve release version & channel
        id: meta
        run: |
          set -euo pipefail
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v${PKG_VERSION}"
          fi
          TAG_VERSION="${TAG#v}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG (version $TAG_VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi
          if printf '%s' "$PKG_VERSION" | grep -q '-'; then
            PRERELEASE=true
            PRE="${PKG_VERSION#*-}"      # e.g. beta.1
            NPM_TAG="${PRE%%.*}"          # e.g. beta
          else
            PRERELEASE=false
            NPM_TAG=latest
          fi
          TARBALL="loomctl-${PKG_VERSION}.tgz"
          {
            echo "version=$PKG_VERSION"
            echo "tag=$TAG"
            echo "tarball=$TARBALL"
            echo "npm_tag=$NPM_TAG"
            echo "prerelease=$PRERELEASE"
          } >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG → npm dist-tag '$NPM_TAG' (prerelease=$PRERELEASE), artifact $TARBALL"

      - name: Pack the npm tarball
        run: node scripts/build-npm-package.mjs --no-build # reuse the built + tested dist

      - name: Verify tarball exists
        run: test -f "${{ steps.meta.outputs.tarball }}"

      - name: Publish to npm (OIDC trusted publishing — no token; provenance is automatic)
        run: npm publish "${{ steps.meta.outputs.tarball }}" --access public --tag "${{ steps.meta.outputs.npm_tag }}"

      - name: Extract changelog notes
        run: node scripts/extract-changelog.mjs "${{ steps.meta.outputs.version }}" > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: ${{ steps.meta.outputs.tarball }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
