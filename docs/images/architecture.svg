<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 720" width="1240" height="720" font-family="'JetBrains Mono', ui-monospace, 'Cascadia Code', Consolas, monospace" role="img" aria-label="Loom architecture: real claude PTY sessions and a stateless web viewport both connect to a local daemon that owns the durable state (PTY host, SQLite, Fastify HTTP/WS gateway, task MCP, read-only git, vault committer), over a shared contract package.">
  <title>Loom architecture</title>
  <defs>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.022" stroke-width="1"/>
    </pattern>
    <marker id="phEnd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#2ee66e"/></marker>
    <marker id="phStart" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M10 0L0 5L10 10z" fill="#2ee66e"/></marker>
    <marker id="cyEnd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#5bc8ff"/></marker>
    <marker id="cyStart" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M10 0L0 5L10 10z" fill="#5bc8ff"/></marker>
  </defs>

  <!-- backdrop -->
  <rect width="1240" height="720" fill="#0a0b0c"/>
  <rect width="1240" height="720" fill="url(#grid)"/>

  <!-- title -->
  <g transform="translate(40 34)">
    <g stroke="#2ee66e" stroke-width="2.4" stroke-linecap="round" transform="translate(0 -16) scale(0.92)">
      <path d="M8 4 V13.2 M8 18.8 V20"/><path d="M16 4 V5.2 M16 10.8 V20"/>
      <path d="M4 8 H5.2 M10.8 8 H20"/><path d="M4 16 H13.2 M18.8 16 H20"/>
    </g>
    <text x="32" y="2" font-size="17" font-weight="700" letter-spacing="1.6" fill="#e6eaed">loom</text>
    <text x="84" y="2" font-size="14" fill="#5a636c">· architecture</text>
  </g>

  <!-- ============ LEFT: real claude sessions ============ -->
  <text x="40" y="112" font-size="12" letter-spacing="2.4" fill="#2ee66e">REAL CLAUDE SESSIONS</text>
  <g>
    <!-- card 1 -->
    <rect x="40" y="126" width="236" height="70" rx="8" fill="#101316" stroke="#2a323a"/>
    <text x="58" y="158" font-size="15.5" fill="#e6eaed"><tspan fill="#2ee66e">▌</tspan> manager</text>
    <text x="58" y="180" font-size="12.5" fill="#8a929b">interactive claude · node-pty</text>
    <!-- card 2 -->
    <rect x="40" y="210" width="236" height="70" rx="8" fill="#101316" stroke="#2a323a"/>
    <text x="58" y="242" font-size="15.5" fill="#e6eaed"><tspan fill="#2ee66e">▌</tspan> worker · landing-site</text>
    <text x="58" y="264" font-size="12.5" fill="#8a929b">interactive claude · node-pty</text>
    <!-- card 3 -->
    <rect x="40" y="294" width="236" height="70" rx="8" fill="#101316" stroke="#2a323a"/>
    <text x="58" y="326" font-size="15.5" fill="#e6eaed"><tspan fill="#2ee66e">▌</tspan> worker · api-gateway</text>
    <text x="58" y="348" font-size="12.5" fill="#8a929b">interactive claude · node-pty</text>
  </g>

  <!-- ============ CENTER: daemon ============ -->
  <rect x="360" y="96" width="520" height="420" rx="12" fill="#0d0f11" stroke="#2a323a"/>
  <rect x="360" y="96" width="520" height="3" rx="1.5" fill="#2ee66e" opacity="0.55"/>
  <text x="384" y="138" font-size="20" font-weight="700" letter-spacing="0.5" fill="#e6eaed">daemon</text>
  <text x="856" y="132" font-size="12.5" text-anchor="end" fill="#8a929b">127.0.0.1:4317</text>
  <text x="856" y="150" font-size="11.5" text-anchor="end" fill="#5a636c">loopback only</text>
  <text x="384" y="162" font-size="12.5" fill="#5a636c">owns everything durable</text>

  <!-- daemon modules: 2 cols x 3 rows -->
  <g>
    <!-- r1c1 PTY host -->
    <rect x="384" y="184" width="232" height="86" rx="8" fill="#101316" stroke="#2a323a"/>
    <circle cx="404" cy="210" r="4" fill="#2ee66e"/>
    <text x="418" y="215" font-size="15" fill="#e6eaed">PTY host</text>
    <text x="404" y="240" font-size="12" fill="#8a929b">drives node-pty · 120×40</text>
    <text x="404" y="258" font-size="12" fill="#5a636c">pty/host.ts · Job Object</text>
    <!-- r1c2 gateway -->
    <rect x="624" y="184" width="232" height="86" rx="8" fill="#101316" stroke="#2a323a"/>
    <circle cx="644" cy="210" r="4" fill="#5bc8ff"/>
    <text x="658" y="215" font-size="15" fill="#e6eaed">HTTP / WS gateway</text>
    <text x="644" y="240" font-size="12" fill="#8a929b">Fastify · REST + WebSocket</text>
    <text x="644" y="258" font-size="12" fill="#5a636c">gateway/</text>
    <!-- r2c1 task MCP -->
    <rect x="384" y="286" width="232" height="86" rx="8" fill="#101316" stroke="#2a323a"/>
    <circle cx="404" cy="312" r="4" fill="#2ee66e"/>
    <text x="418" y="317" font-size="15" fill="#e6eaed">task MCP server</text>
    <text x="404" y="342" font-size="12" fill="#8a929b">project-scoped · /mcp/:id</text>
    <text x="404" y="360" font-size="12" fill="#5a636c">project derived server-side</text>
    <!-- r2c2 SQLite -->
    <rect x="624" y="286" width="232" height="86" rx="8" fill="#101316" stroke="#2a323a"/>
    <circle cx="644" cy="312" r="4" fill="#ffb23e"/>
    <text x="658" y="317" font-size="15" fill="#e6eaed">SQLite store</text>
    <text x="644" y="342" font-size="12" fill="#8a929b">durable state · WAL</text>
    <text x="644" y="360" font-size="12" fill="#5a636c">db.ts</text>
    <!-- r3c1 read-only git -->
    <rect x="384" y="388" width="232" height="86" rx="8" fill="#101316" stroke="#2a323a"/>
    <circle cx="404" cy="414" r="4" fill="#ffb23e"/>
    <text x="418" y="419" font-size="15" fill="#e6eaed">read-only git</text>
    <text x="404" y="444" font-size="12" fill="#8a929b">log · branches · diff</text>
    <text x="404" y="462" font-size="12" fill="#5a636c">git/ (writes: human REST)</text>
    <!-- r3c2 vault committer -->
    <rect x="624" y="388" width="232" height="86" rx="8" fill="#101316" stroke="#2a323a"/>
    <circle cx="644" cy="414" r="4" fill="#ffb23e"/>
    <text x="658" y="419" font-size="15" fill="#e6eaed">vault committer</text>
    <text x="644" y="444" font-size="12" fill="#8a929b">auto-commits vault writes</text>
    <text x="644" y="462" font-size="12" fill="#5a636c">vault/</text>
  </g>

  <!-- ============ RIGHT: web viewport ============ -->
  <text x="950" y="112" font-size="12" letter-spacing="2.4" fill="#5bc8ff">WEB VIEWPORT</text>
  <rect x="950" y="126" width="254" height="150" rx="10" fill="#101316" stroke="#2a323a"/>
  <rect x="950" y="126" width="254" height="3" rx="1.5" fill="#5bc8ff" opacity="0.5"/>
  <text x="972" y="162" font-size="16" font-weight="700" fill="#e6eaed">stateless viewport</text>
  <text x="972" y="188" font-size="12.5" fill="#8a929b">React / Vite · holds no state</text>
  <text x="972" y="210" font-size="12.5" fill="#8a929b">attaches &amp; detaches freely</text>
  <text x="972" y="240" font-size="12" fill="#5a636c">sessions outlive viewers —</text>
  <text x="972" y="258" font-size="12" fill="#5a636c">a closed tab never kills a PTY</text>

  <!-- ============ connections ============ -->
  <!-- PTY: claude sessions <-> PTY host -->
  <line x1="284" y1="208" x2="356" y2="208" stroke="#2ee66e" stroke-width="1.6" marker-start="url(#phStart)" marker-end="url(#phEnd)"/>
  <text x="320" y="198" font-size="11.5" text-anchor="middle" fill="#8a929b">PTY</text>
  <!-- MCP: claude sessions <-> task MCP (over HTTP) -->
  <line x1="284" y1="300" x2="356" y2="300" stroke="#5bc8ff" stroke-width="1.6" stroke-dasharray="5 4" marker-start="url(#cyStart)" marker-end="url(#cyEnd)"/>
  <text x="320" y="290" font-size="11.5" text-anchor="middle" fill="#8a929b">MCP</text>
  <text x="320" y="322" font-size="10.5" text-anchor="middle" fill="#5a636c">HTTP</text>

  <!-- gateway <-> web viewport (WebSocket) -->
  <line x1="884" y1="212" x2="946" y2="196" stroke="#5bc8ff" stroke-width="1.6" marker-start="url(#cyStart)" marker-end="url(#cyEnd)"/>
  <text x="915" y="175" font-size="11.5" text-anchor="middle" fill="#8a929b">WebSocket</text>
  <text x="915" y="245" font-size="10.5" text-anchor="middle" fill="#5a636c">attach / detach</text>

  <!-- ============ shared contract bar ============ -->
  <rect x="40" y="566" width="1164" height="62" rx="10" fill="#0d0f11" stroke="#2a323a"/>
  <rect x="40" y="566" width="3" height="62" rx="1.5" fill="#2ee66e" opacity="0.55"/>
  <text x="66" y="595" font-size="15" font-weight="700" fill="#2ee66e">shared · the contract</text>
  <text x="66" y="615" font-size="12.5" fill="#8a929b">types (Project / Topic / Session FSM · Task) · config (resolveConfig) · protocol (ws / REST)</text>
  <text x="1180" y="603" font-size="12" text-anchor="end" fill="#5a636c">imported by daemon + web</text>

  <!-- dotted links from shared bar up to daemon + web -->
  <path d="M620 566 V514" stroke="#5a636c" stroke-width="1.2" stroke-dasharray="3 5" fill="none"/>
  <path d="M1077 566 V276" stroke="#5a636c" stroke-width="1.2" stroke-dasharray="3 5" fill="none"/>

  <!-- footnote -->
  <text x="40" y="672" font-size="12" fill="#5a636c">engine session id captured via the SessionStart hook → /internal/hook · agents never pass a projectId — it is derived from the session</text>
</svg>
